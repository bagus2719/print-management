{% extends 'layouts/app.html' %}
{% block title %}Profil Saya{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">
    <div class="clay-card overflow-hidden animate-slide-up">
        <div class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 px-8 py-6">
            <h3 class="text-2xl font-black text-white flex items-center gap-4">
                <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-sm">
                    <i class="fas fa-user-edit text-white text-xl"></i>
                </div>
                Pengaturan Profil
            </h3>
        </div>
        <div class="p-8">
            <form method="POST" action="{{ url_for('main.profile') }}" class="space-y-6">
                <!-- Username -->
                <div>
                    <label for="username" class="block text-base font-bold text-gray-700 dark:text-gray-200 mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-user text-indigo-400"></i>
                        </div>
                        <input id="username" name="username" type="text" value="{{ current_user.username }}" required class="clay-input w-full pl-11 pr-5 py-3.5 text-base text-gray-700 dark:text-white" placeholder="Username Anda">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-base font-bold text-gray-700 dark:text-gray-200 mb-2">Alamat Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-emerald-400"></i>
                        </div>
                        <input id="email" name="email" type="email" value="{{ current_user.email }}" required class="clay-input w-full pl-11 pr-5 py-3.5 text-base text-gray-700 dark:text-white" placeholder="email@contoh.com">
                    </div>
                </div>

                <!-- Password -->
                <div class="pt-4 border-t border-gray-100 dark:border-slate-700">
                    <p class="text-sm font-black text-gray-400 uppercase tracking-widest mb-4">Ganti Sandi (Opsional)</p>
                    <label for="password" class="block text-base font-bold text-gray-700 dark:text-gray-200 mb-2">Sandi Baru</label>
                    <div class="relative mb-2">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-pink-400"></i>
                        </div>
                        <input id="password" name="password" type="password" minlength="6" class="clay-input w-full pl-11 pr-5 py-3.5 text-base text-gray-700 dark:text-white" placeholder="Biarkan kosong jika tidak ingin mengubah">
                    </div>
                    <p class="text-xs text-gray-400"><i class="fas fa-info-circle mr-1"></i> Minimal 6 karakter.</p>
                </div>

                <div class="pt-6">
                    <button type="submit" class="clay-btn w-full py-4 text-base font-black text-white bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 flex items-center justify-center gap-2">
                        <i class="fas fa-save"></i> Simpan Perubahan
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
