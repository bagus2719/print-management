{% extends 'layouts/app.html' %}
{% block title %}Profil Saya{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden animate-slide-up">
        <div class="bg-blue-800 px-8 py-6 border-b border-blue-900">
            <h3 class="text-2xl font-bold text-white flex items-center gap-4">
                <i class="fas fa-user-edit text-blue-300"></i>
                Pengaturan Profil
            </h3>
        </div>
        <div class="p-8">
            <form method="POST" action="{{ url_for('main.profile') }}" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <!-- Username -->
                <div>
                    <label for="username" class="block text-sm font-bold text-gray-700 mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input id="username" name="username" type="text" value="{{ current_user.username }}" required class="w-full pl-11 pr-5 py-3 border border-gray-300 rounded-xl text-base text-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Username Anda">
                    </div>
                </div>

                <!-- Password -->
                <div class="pt-6 border-t border-gray-100">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Ganti Sandi (Opsional)</p>
                    <label for="password" class="block text-sm font-bold text-gray-700 mb-2">Sandi Baru</label>
                    <div class="relative mb-2">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input id="password" name="password" type="password" minlength="6" class="w-full pl-11 pr-5 py-3 border border-gray-300 rounded-xl text-base text-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Biarkan kosong jika tidak ingin mengubah">
                    </div>
                    <p class="text-xs text-gray-500"><i class="fas fa-info-circle mr-1"></i> Minimal 6 karakter.</p>
                </div>

                <div class="pt-6">
                    <button type="submit" class="w-full py-3.5 text-sm font-bold text-white bg-blue-700 hover:bg-blue-800 rounded-xl shadow-md hover:shadow-lg transition flex items-center justify-center gap-2">
                        <i class="fas fa-save"></i> Simpan Perubahan
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
