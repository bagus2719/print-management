{% extends 'layouts/app.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 relative overflow-hidden">
    <div class="absolute -top-20 -right-20 w-60 h-60 bg-green-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-bounce-soft"></div>
    <div class="absolute -bottom-20 -left-20 w-72 h-72 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-bounce-soft" style="animation-delay:1.5s"></div>

    <div class="clay-card max-w-md w-full p-10 relative z-10 animate-slide-up">
        <div class="text-center mb-8">
            <div class="mx-auto w-20 h-20 bg-gradient-to-tr from-green-400 to-emerald-500 rounded-2xl flex items-center justify-center shadow-xl">
                <i class="fas fa-shield-alt text-white text-4xl"></i>
            </div>
            <h2 class="mt-6 text-3xl font-black text-gray-800">Reset Password</h2>
            <p class="mt-2 text-sm font-medium text-gray-500">Masukkan password baru Anda.</p>
        </div>
        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="space-y-5">
            <div>
                <label for="password" class="block text-sm font-bold text-gray-600 mb-1.5">Password Baru</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="password" name="password" type="password" required class="clay-input w-full pl-11 pr-4 py-3 text-sm" placeholder="Min. 6 karakter">
                </div>
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-bold text-gray-600 mb-1.5">Konfirmasi Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="confirm_password" name="confirm_password" type="password" required class="clay-input w-full pl-11 pr-4 py-3 text-sm" placeholder="Ulangi password baru">
                </div>
            </div>
            <button type="submit" class="clay-btn w-full py-3.5 text-sm font-black tracking-wide text-white bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-600 hover:to-emerald-600">
                <i class="fas fa-save mr-2"></i> SIMPAN PASSWORD BARU
            </button>
        </form>
    </div>
</div>
{% endblock %}
