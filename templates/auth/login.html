{% extends 'layouts/app.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 relative overflow-hidden">
    <div class="absolute -top-20 -left-20 w-60 h-60 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-bounce-soft"></div>
    <div class="absolute -bottom-20 -right-20 w-72 h-72 bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-bounce-soft" style="animation-delay:1s"></div>

    <div class="bg-white rounded-2xl shadow-lg border border-gray-200 max-w-md w-full p-10 relative z-10 animate-slide-up">
        <div class="text-center mb-8">
            <div class="mx-auto w-20 h-20 bg-blue-700 rounded-2xl flex items-center justify-center shadow-lg transform rotate-3 hover:rotate-6 transition-transform duration-300 cursor-pointer">
                <i class="fas fa-print text-white text-4xl"></i>
            </div>
            <h2 class="mt-6 text-3xl font-black text-gray-800">Selamat Datang!</h2>
            <p class="mt-2 text-sm font-medium text-gray-500">Belum punya akun? <a href="{{ url_for('auth.register') }}" class="font-bold text-blue-700 hover:text-blue-600 border-b-2 border-blue-200 hover:border-blue-500 pb-0.5 transition">Daftar di sini</a></p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="username" class="block text-sm font-bold text-gray-600 mb-1.5">Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="username" name="username" type="text" required class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Masukkan username">
                </div>
            </div>
            <div>
                <label for="password" class="block text-sm font-bold text-gray-600 mb-1.5">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="password" name="password" type="password" required class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Masukkan password">
                </div>
            </div>
            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input name="remember" type="checkbox" class="w-4 h-4 text-blue-700 rounded focus:ring-blue-600 border-gray-300">
                    <span class="text-sm font-medium text-gray-600">Ingat saya</span>
                </label>
            </div>
            <button type="submit" class="w-full py-3.5 rounded-xl text-sm font-bold tracking-wide text-white bg-blue-700 hover:bg-blue-800 shadow-md hover:shadow-lg transition mt-2">
                <i class="fas fa-sign-in-alt mr-2"></i> LOGIN SEKARANG
            </button>
        </form>
    </div>
</div>
{% endblock %}
