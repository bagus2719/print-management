{% extends 'layouts/app.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 relative overflow-hidden">
    <div class="absolute -top-20 -left-20 w-60 h-60 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-bounce-soft"></div>
    <div class="absolute -bottom-20 -right-20 w-72 h-72 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-bounce-soft" style="animation-delay:1s"></div>

    <div class="clay-card max-w-md w-full p-10 relative z-10 animate-slide-up">
        <div class="text-center mb-8">
            <div class="mx-auto w-20 h-20 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl flex items-center justify-center shadow-xl transform rotate-3 hover:rotate-6 transition-transform duration-300 cursor-pointer">
                <i class="fas fa-print text-white text-4xl"></i>
            </div>
            <h2 class="mt-6 text-3xl font-black text-gray-800">Selamat Datang!</h2>
            <p class="mt-2 text-sm font-medium text-gray-500">Belum punya akun? <a href="{{ url_for('auth.register') }}" class="font-bold text-indigo-600 hover:text-indigo-500 border-b-2 border-indigo-200 hover:border-indigo-500 pb-0.5 transition">Daftar di sini</a></p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-bold text-gray-600 mb-1.5">Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="username" name="username" type="text" required class="clay-input w-full pl-11 pr-4 py-3 text-sm" placeholder="Masukkan username">
                </div>
            </div>
            <div>
                <label for="password" class="block text-sm font-bold text-gray-600 mb-1.5">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="password" name="password" type="password" required class="clay-input w-full pl-11 pr-4 py-3 text-sm" placeholder="Masukkan password">
                </div>
            </div>
            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input name="remember" type="checkbox" class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 border-gray-300">
                    <span class="text-sm font-medium text-gray-600">Ingat saya</span>
                </label>
                <a href="{{ url_for('auth.forgot_password') }}" class="text-sm font-bold text-indigo-600 hover:text-indigo-500 transition">Lupa password?</a>
            </div>
            <button type="submit" class="clay-btn w-full py-3.5 text-sm font-black tracking-wide text-white bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 mt-2">
                <i class="fas fa-sign-in-alt mr-2"></i> LOGIN SEKARANG
            </button>
        </form>
    </div>
</div>
{% endblock %}
