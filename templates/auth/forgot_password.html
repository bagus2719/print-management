{% extends 'layouts/app.html' %}
{% block title %}Lupa Password{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 relative overflow-hidden">
    <div class="absolute -top-20 -left-20 w-60 h-60 bg-amber-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-bounce-soft"></div>
    <div class="absolute -bottom-20 -right-20 w-72 h-72 bg-rose-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-bounce-soft" style="animation-delay:2s"></div>

    <div class="clay-card max-w-md w-full p-10 relative z-10 animate-slide-up">
        <div class="text-center mb-8">
            <div class="mx-auto w-20 h-20 bg-gradient-to-tr from-amber-400 to-orange-500 rounded-2xl flex items-center justify-center shadow-xl animate-wiggle cursor-pointer">
                <i class="fas fa-key text-white text-4xl"></i>
            </div>
            <h2 class="mt-6 text-3xl font-black text-gray-800">Lupa Password?</h2>
            <p class="mt-2 text-sm font-medium text-gray-500">Masukkan email yang terdaftar di akun Anda, kami akan membuatkan token reset.</p>
        </div>
        <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-bold text-gray-600 mb-1.5">Email</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="email" name="email" type="email" required class="clay-input w-full pl-11 pr-4 py-3 text-sm" placeholder="nama@email.com">
                </div>
            </div>
            <button type="submit" class="clay-btn w-full py-3.5 text-sm font-black tracking-wide text-white bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600">
                <i class="fas fa-paper-plane mr-2"></i> KIRIM TOKEN RESET
            </button>
        </form>
        <div class="text-center mt-6">
            <a href="{{ url_for('auth.login') }}" class="text-sm font-bold text-indigo-600 hover:text-indigo-500 transition"><i class="fas fa-arrow-left mr-1"></i> Kembali ke Login</a>
        </div>
    </div>
</div>
{% endblock %}
