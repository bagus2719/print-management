{% extends 'layouts/app.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 relative overflow-hidden">
    <div class="absolute -top-20 -right-20 w-60 h-60 bg-teal-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-bounce-soft"></div>
    <div class="absolute -bottom-20 -left-20 w-72 h-72 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-bounce-soft" style="animation-delay:1.5s"></div>

    <div class="clay-card max-w-md w-full p-10 relative z-10 animate-slide-up">
        <div class="text-center mb-8">
            <div class="mx-auto w-20 h-20 bg-gradient-to-tr from-teal-400 to-emerald-500 rounded-2xl flex items-center justify-center shadow-xl transform -rotate-3 hover:-rotate-6 transition-transform duration-300 cursor-pointer">
                <i class="fas fa-user-plus text-white text-4xl"></i>
            </div>
            <h2 class="mt-6 text-3xl font-black text-gray-800">Buat Akun Baru</h2>
            <p class="mt-2 text-sm font-medium text-gray-500">Sudah punya akun? <a href="{{ url_for('auth.login') }}" class="font-bold text-teal-600 hover:text-teal-500 border-b-2 border-teal-200 hover:border-teal-500 pb-0.5 transition">Login di sini</a></p>
        </div>
        <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-bold text-gray-600 mb-1.5">Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="username" name="username" type="text" required class="clay-input w-full pl-11 pr-4 py-3 text-sm" placeholder="Pilih username">
                </div>
            </div>
            <div>
                <label for="email" class="block text-sm font-bold text-gray-600 mb-1.5">Email</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="email" name="email" type="email" required class="clay-input w-full pl-11 pr-4 py-3 text-sm" placeholder="nama@email.com">
                </div>
            </div>
            <div>
                <label for="password" class="block text-sm font-bold text-gray-600 mb-1.5">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="password" name="password" type="password" required class="clay-input w-full pl-11 pr-4 py-3 text-sm" placeholder="Min. 6 karakter">
                </div>
            </div>
            <button type="submit" class="clay-btn w-full py-3.5 text-sm font-black tracking-wide text-white bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-600 hover:to-emerald-600 mt-2">
                <i class="fas fa-check mr-2"></i> DAFTAR SEKARANG
            </button>
        </form>
    </div>
</div>
{% endblock %}
